# Wheatley Linux pacman configuration
# Shipped to /usr/share/wheatley/pacman.conf and used by the installer
# (basestrap -C) and copied to the installed system as /etc/pacman.conf.
[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ----- Artix repositories -----
[system]
Include = /etc/pacman.d/mirrorlist

[world]
Include = /etc/pacman.d/mirrorlist

[galaxy]
Include = /etc/pacman.d/mirrorlist

# ----- CachyOS (kernel: linux-cachyos) -----
[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# ----- Wheatley local repository (custom packages: WMs, st, branding) -----
[wheatley]
SigLevel = Optional TrustAll
Server = file:///usr/share/wheatley/repo
