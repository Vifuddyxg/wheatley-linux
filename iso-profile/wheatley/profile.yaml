---
# Wheatley Linux — artools buildiso profile (current YAML format).
# The live ISO boots to an autologin shell that points at the TUI installer and
# can preview a window manager via `startx`. `services:`/`user-services:` are
# enabled automatically by artools — no manual runsvdir symlinks.
#
# The live system runs the stock `linux` kernel (from common.yaml) for a robust
# boot; the CachyOS kernel (linux-cachyos) is installed into the TARGET by the
# installer at install time.

live-session:
  user: wheatley
  password: wheatley
  autologin: true
  use-xlibre: false
  services:
    - NetworkManager
  user-services:
    - dbus
    - pipewire
    - pipewire-pulse
    - wireplumber

rootfs:
  packages:
    # --- Wheatley custom repo packages ---
    - wheatley-branding
    - apeturewm
    - atomwm
    - st-wheatley
    # --- TUI installer + its partitioning tools (must be runnable live) ---
    - wheatley-installer
    - gptfdisk
    - parted
    # --- 'Offline express' install: clone the live system to disk with no net.
    #     rsync does the copy; grub/efibootmgr install the bootloader. The clone
    #     uses the live system's STOCK `linux` kernel — linux-cachyos can NOT be
    #     added here: a second kernel breaks artools' make_bootfs (live boot).
    #     Choose 'Custom online' to get the CachyOS kernel. ---
    - rsync
    - grub
    - efibootmgr
    - os-prober
    # --- keyring/mirrorlist the installer's basestrap -C resolves on the host ---
    - cachyos-keyring
    - cachyos-mirrorlist
    # --- networking (so the installer has connectivity: nmtui) ---
    - networkmanager
    - wpa_supplicant
    - openresolv
    # --- TUI login greeter (greetd + tuigreet). Shipped live so the OFFLINE
    #     express install can give the installed disk a real password login too.
    #     The live session itself still autologins via artix-live; these packages
    #     just need to exist for the installer to configure them. ---
    - greetd
    - greetd-tuigreet
    - greetd-runit
    # --- desktop preview bits (preview a WM from the live session) ---
    - xorg-server
    - xorg-xinit
    - xorg-xrandr
    - xorg-xsetroot
    - rofi
    - dmenu
    - pipewire
    - wireplumber
    - pipewire-pulse
    - pipewire-alsa
    - firefox
    - mpv
    - zathura
    - zathura-pdf-mupdf
    - feh
    - dunst
    - pavucontrol
    - lf
    - scrot
    - xclip
    - fastfetch
    - noto-fonts
    - noto-fonts-emoji
    - ttf-dejavu
    - ttf-jetbrains-mono
    # --- handy CLI ---
    - git
    - wget
    - htop
    - vim
    # common.yaml pulls the virtual `vi`; name a concrete provider so the
    # non-interactive rootfs install doesn't stop at a provider prompt.
    - ex-vi-compat
  packages-init:
    dinit:
      - networkmanager-dinit
      - pipewire-dinit
      - pipewire-pulse-dinit
      - wireplumber-dinit
      - dinit-user-spawn
    openrc:
      - networkmanager-openrc
      - pipewire-openrc
      - pipewire-pulse-openrc
      - wireplumber-openrc
    runit:
      - networkmanager-runit
    s6:
      - networkmanager-s6

livefs:
  packages:
    - squashfs-tools
    - mkinitcpio-nfs-utils
    - artix-grub-live
  packages-init:
    dinit:
      - artix-live-dinit
    openrc:
      - artix-live-openrc
    runit:
      - artix-live-runit
    s6:
      - artix-live-s6
